"$schema" = 'https://starship.rs/config-schema.json'

# 1. Enable the transient prompt feature
enable_transient_prompt = true

# 2. Main Left Prompt Layout
format = """
[╭─](bold #9A348E)[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#86BBD8 bg:#06969A)\
$docker_context\
[](fg:#06969A bg:#33658A)\
$time\
[](fg:#33658A)
[╰─ ](bold #9A348E)${custom.git_symbol}${custom.nogit_symbol}"""

# 3. Right Prompt Layout (Stealth Modules)
right_format = """\
${custom.mcu}\
"""

# 4. Transient Prompt Layout (What is left behind after you hit Enter)
[transient_prompt]
format = '[╰─ ](bold #9A348E)${custom.git_symbol}${custom.nogit_symbol}'

# ==========================================
# STANDARD MODULE SETTINGS
# ==========================================

[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#9A348E"
disabled = true

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A"
format = '[ ♥ $time ]($style)'

# ==========================================
# CUSTOM MODULE DEFINITIONS
# ==========================================

[custom.git_symbol]
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
symbol = '⠠⠵'
format = '[$symbol]($style) '
style = "bold green"

[custom.nogit_symbol]
when = 'git rev-parse --is-inside-work-tree 2>/dev/null; test $? -ne 0'
symbol = '○'
format = '[$symbol]($style) '
style = "bold blue"

[custom.mcu]
# Safely loops through possible devices and exits successfully on the first one it finds
when = ''' sh -c 'for dev in /dev/ttyACM* /dev/ttyUSB*; do if [ -e "$dev" ]; then exit 0; fi; done; exit 1' '''
# Changed ~ to $HOME for safer path expansion
command = 'bash $HOME/.config/starship/mcu_detect.sh'
format = ' [](#FCA17D)[$output](bg:#FCA17D fg:#9A348E)[](#FCA17D)'
